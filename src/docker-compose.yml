version: '3.8'

services:
  # MongoDB 數據庫
  mongodb:
    image: mongo:7.0-jammy
    container_name: hkjc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-changeme_default_password}
      MONGO_INITDB_DATABASE: horse_racing
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
      - ./docker/mongodb/mongod.conf:/etc/mongod.conf:ro
    command: ["mongod", "--config", "/etc/mongod.conf"]
    networks:
      - hkjc-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API 服務 (FastAPI + Python)
  api:
    build:
      context: ./src
      dockerfile: ../docker/api/Dockerfile
    container_name: hkjc-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://admin:${MONGODB_ROOT_PASSWORD:-changeme_default_password}@mongodb:27017/horse_racing?authSource=admin
      - NODE_ENV=production
      - PORT=3001
      - TZ=Asia/Hong_Kong
    volumes:
      - ./src:/app:cached
      - /app/node_modules
      - api_logs:/app/logs
      - models_data:/app/models
      - pipeline_logs:/app/logs/pipeline:ro
      - odds_logs:/app/scrapers/logs:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hkjc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 Web 應用 (React + Vite)
  web:
    build:
      context: ./src/web-app
      dockerfile: ../../docker/web/Dockerfile
    container_name: hkjc-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VITE_API_BASE_URL=http://api:3001
      - NODE_ENV=production
      - TZ=Asia/Hong_Kong
    volumes:
      - ./docker/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - hkjc-network

  # Odds Collector (Chromium/Playwright 爬蟲) - 永遠運行
  odds-collector:
    build:
      context: .
      dockerfile: docker/odds-collector/Dockerfile
    container_name: hkjc-odds-collector
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://admin:${MONGODB_ROOT_PASSWORD:-changeme_default_password}@mongodb:27017/horse_racing?authSource=admin
      - API_BASE=http://api:3001
      - RACE_DATE=${RACE_DATE:-}
      - VENUE=${VENUE:-}
      - TZ=Asia/Hong_Kong
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    # Chromium 必需權限
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    depends_on:
      mongodb:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - hkjc-network
    volumes:
      - odds_logs:/app/scrapers/logs
    # 只在賽事日手動啟動
    profiles:
      - race-day

  # Daily Pipeline (數據同步 + 模型訓練)
  pipeline:
    build:
      context: .
      dockerfile: docker/pipeline/Dockerfile
    container_name: hkjc-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://admin:${MONGODB_ROOT_PASSWORD:-changeme_default_password}@mongodb:27017/horse_racing?authSource=admin
      - TZ=Asia/Hong_Kong
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app:cached
      - pipeline_logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hkjc-network
    command: ["/bin/sh", "-c", "service cron start && tail -f /dev/null"]

  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hkjc-cloudflared
    restart: unless-stopped
    volumes:
      - /Users/fatlung/.cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    command: tunnel run --config /etc/cloudflared/config.yml
    profiles:
      - production
    networks:
      - hkjc-network

  # Nginx 反向代理 (可選，用於生產環境 SSL)
  nginx:
    image: nginx:alpine
    container_name: hkjc-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - hkjc-network
    profiles:
      - production

volumes:
  mongodb_data:
    driver: local
  api_logs:
    driver: local
  pipeline_logs:
  odds_logs:
    driver: local
  models_data:
    driver: local

networks:
  hkjc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
